    <script id="console-shield">
      (function() {
        // Broad keywords to suppress annoying browser/extension logs
        const IGNORED = [
          "asynchronous response by returning true",
          "message channel closed before a response was received",
          "asynchronous response",
          "message channel closed",
          "chrome-extension",
          "DevTools",
          "React Router"
        ];
        
        const isIgnored = (err) => {
          if (!err) return false;
          const s = String(err.stack || err.message || err || "").toLowerCase();
          return IGNORED.some(i => s.includes(i.toLowerCase()));
        };

        // Aggressive console patching
        const patch = () => {
          ['error', 'warn', 'debug'].forEach(m => {
            const original = console[m];
            if (!original || original.__shielded) return;
            const wrapper = function(...args) {
              if (isIgnored(args[0])) return;
              original.apply(console, args);
            };
            wrapper.__shielded = true;
            try { 
              Object.defineProperty(console, m, { value: wrapper, writable: true, configurable: true }); 
            } catch(e) { 
              console[m] = wrapper; 
            }
          });
        };
        patch();
        
        // Listeners for uncaught errors/rejections
        const handler = (e) => {
          const err = e.reason || e.error || e.message || e;
          if (isIgnored(err)) {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            return true;
          }
        };
        window.addEventListener("unhandledrejection", handler, true);
        window.addEventListener("error", handler, true);
        
        // Re-patch occasionally in case of late-loading extension overrides
        setInterval(patch, 2000);
      })();
    </script>
